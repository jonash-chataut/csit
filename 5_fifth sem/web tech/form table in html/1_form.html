<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My html form</title>
</head>
<body>
    <fieldset>
        <legend>Form details</legend>
    <form >
        Enter Name: <br>
        <input type="text" autofocus ><br> <br>
        Enter ID: <br>
        <input type="number"><br><br>
        Enter DOB: <br>
        <input type="date"><br><br>
        Enter Password: <br>
        <input type="password"> <br><br>
        Upload file: <br>
        <input type="file"><br><br>
        Enter email: <br>
        <input type="email"><br><br>
        Gender: <br>
        <input type="radio" name="aaa" checked>Male
        <input type="radio" name="aaa">Female
        <input type="radio" name="aaa">Other <br><br>
        Hobbies:
        <input type="checkbox" checked> Football
        <input type="checkbox" checked> Cricket
        <input type="checkbox" checked> Gaming <br><br>
        Qualification: <br>
        SEE:
        <select name="" id="">
            <option value="" disabled selected >Select your option</option>
            <option >GoN </option>
            <option>Matriculation</option>
            <option>CBSE</option>
            <option>Private</option> 
        </select> 
          High School:
        <select name="" id="">
            <option value="" disabled selected >Select your option</option>
            <option >Intermediate</option>
            <option>+2</option>
            <option>Diploma</option>
        </select><br><br>
        Enter Comment: <br>
        <textarea name="" id="" rows="5" cols="50" placeholder="text here...."></textarea> <br>
        <input type="submit" value="Summit data" name="" id="">
        <input type="reset" value="Rest data" name="" id="">
    </form>
    </fieldset>
</body>
</html>
