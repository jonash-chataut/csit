<!-- Question -->
<!-- What are lists? Show the application of lists in HTML. -->

<!-- 
# Definition:
# Lists in HTML are used to organize and display related
# items in a structured format on a webpage.

# ---------------------------------------------------------
#                 TYPES OF HTML LISTS
# ---------------------------------------------------------

# 1. Ordered List (<ol>)
#    - Displays items in numbered format
#    - Used when sequence is important

# Example:
<ol>
    <li>Step 1</li>
    <li>Step 2</li>
    <li>Step 3</li>
</ol>


# 2. Unordered List (<ul>)
#    - Displays items using bullets
#    - Used when order is not important

# Example:
<ul>
    <li>Apple</li>
    <li>Mango</li>
    <li>Orange</li>
</ul>


# 3. Description List (<dl>)
#    - Used for terms and descriptions

# Example:
<dl>

    <dt>HTML</dt>

    <dd>
        HyperText Markup Language
    </dd>

</dl>


# ---------------------------------------------------------
#              APPLICATIONS OF HTML LISTS
# ---------------------------------------------------------

# -> Creating navigation menus
# -> Displaying instructions or steps
# -> Showing product features
# -> Organizing webpage content
# -> Creating categories
# -> Displaying glossary terms

 -->

 <!-- HTML Code -->
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <!-- Responsive Webpage -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HTML Lists Example</title>

</head>

<body>

    <!-- Main Heading -->
    <h1>
        Application of lists
    </h1>

    <!-- Ordered List -->
    <h2>1. Ordered List</h2>

    <ol>
        <!-- List Items -->
        <li>Brush Teeth</li>
        <li>Attend College</li>
        <li>Study Web</li>
        <li>Sleep</li>

    </ol>


    <!-- Unordered List -->
    <h2>2. Unordered List</h2>

    <ul>
          <!-- List Items -->
        <li>Keyboard</li>
        <li>Mouse</li>
        <li>Printer</li>
        <li>Monitor</li>

    </ul>

</body>
</html>
