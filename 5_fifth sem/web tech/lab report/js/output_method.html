<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Webpage -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>JavaScript Output Methods</title>

</head>

<body>

    <!-- Main Heading -->
    <h1>JavaScript Output Methods</h1>

    <!-- Element for innerHTML Output -->
    <p id="demo"></p>

    <script>
        document.write("<h3>Hello from document.write()</h3>");

        alert("Welcome to JavaScript!");

        console.log("Hello from console.log()");

        document.getElementById("demo").innerHTML =
            "Hello from innerHTML";

    </script>

</body>

</html>
