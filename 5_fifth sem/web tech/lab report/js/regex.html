<!-- A Regular Expression (RegEx) is a pattern used to match, search, and validate text strings.
 It is commonly used for validating form inputs such as email addresses, phone numbers, passwords, etc. -->
 <!DOCTYPE html>
<html>
<body>

<form onsubmit="return validateForm()">
    Email:
    <input type="text" id="email">
    <input type="submit" value="Submit">
</form>

<script>
function validateForm() {
    let email = document.getElementById("email").value;

    // Regular Expression for email validation
    let pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (pattern.test(email)) {
        alert("Valid Email");
        return true;
    } else {
        alert("Invalid Email");
        return false;
    }
}
</script>

</body>
</html>
