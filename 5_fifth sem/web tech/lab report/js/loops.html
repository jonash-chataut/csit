<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Webpage -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Loops and Nested Loops</title>

</head>

<body>

    <h2>JavaScript Loops and Nested Loops</h2>

    <script>

        document.write("<h3>For Loop</h3>");

        for(let i = 1; i <= 5; i++){

            document.write(i + "<br>");
        }

        document.write("<h3>While Loop</h3>");

        let a = 1;

        while(a <= 5){

            document.write(a + "<br>");

            a++;
        }

        document.write("<h3>Do-While Loop</h3>");

        let b = 1;

        do{

            document.write(b + "<br>");

            b++;

        }while(b <= 5);

        document.write("<h3>Nested Loop</h3>");

        for(let i = 1; i <= 3; i++){

            for(let j = 1; j <= 3; j++){

                document.write(j + " ");
            }

            document.write("<br>");
        }

    </script>

</body>

</html>
