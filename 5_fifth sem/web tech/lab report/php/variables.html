<!DOCTYPE html>

    <title>PHP Variables and Print Statements</title>

<body>

<?php

    /* Variable Declaration */

    $name = "John";

    $age = 20;

    $city = "Kathmandu";


    /* Using echo */

    echo "Name: " . $name . "<br>";

    echo "Age: " . $age . "<br>";

    echo "City: " . $city . "<br><br>";

?>
