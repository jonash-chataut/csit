<!DOCTYPE html>
<html>
<head>
    <title>Division Template</title>
    <style>
        .header {
            background: lightgreen;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        .footer {
            background: lightgray;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Header</h2>
    </div>

    <div class="content">
        <p>This is the content section.</p>
    </div>

    <div class="footer">
        <p>Footer</p>
    </div>

</body>
</html>
