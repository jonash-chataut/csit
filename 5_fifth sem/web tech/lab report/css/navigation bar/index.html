<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar</title>
    <style>
        ul {
            list-style: none;
            margin: 0;
            padding: 0;
            background: purple;
        }

        li {
            display: inline-block;
        }

        a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
        }

        a:hover {
            background: gray;
        }
    </style>
</head>
<body>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

</body>
</html>
