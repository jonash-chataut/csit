
<!doctype html>
<html>
  <head>
    <title>CSS Stylesheets</title>
    <!-- Internal CSS -->
    <style>
      h1 {
        color: red;
      }
      p {
        color: green;
        font-size: small;
      }
    </style>
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Internal CSS</h1>
    <p>
      This is internal css
    </p>
    <p class="external">This is external css</p>
  </body>
</html>
